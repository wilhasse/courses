site_name: wilhasse's Documentation Hub
site_url: https://wilhasse.github.io/courses/
site_description: >-
  Deep-dive courses, project documentation, and study notes — MySQL internals
  (server layer and InnoDB storage engine) and more.
repo_url: https://github.com/wilhasse/courses
repo_name: wilhasse/courses
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Query Optimization Journey:
      - The Journey: query-optimization/index.md
      - "1. The Idea": query-optimization/01-the-idea.md
      - "2. What I Studied": query-optimization/02-studies.md
      - "3. Labs & Attempts": query-optimization/03-labs.md
      - "4. SmartSQL (production)": query-optimization/04-smart-sql.md
      - "5. cslog-query (next gen)": query-optimization/05-cslog-query.md
  - MySQL Server Architecture:
      - Series Overview: mysql/server-architecture/README.md
      - "0. The Journey of a Statement": mysql/server-architecture/00-overview.md
      - "1. Connections & Dispatch": mysql/server-architecture/01-connections-and-dispatch.md
      - "2. The Parser": mysql/server-architecture/02-parser.md
      - "3. Resolution & Prepare": mysql/server-architecture/03-resolver-prepare.md
      - "4. The Optimizer": mysql/server-architecture/04-optimizer.md
      - "5. The Iterator Executor": mysql/server-architecture/05-executor.md
      - "6. The Handler API": mysql/server-architecture/06-handler-api.md
      - "7. MDL & Transaction Coordination": mysql/server-architecture/07-mdl-and-transactions.md
      - "8. The Binary Log": mysql/server-architecture/08-binlog.md
      - "9. Replication": mysql/server-architecture/09-replication.md
      - "10. Data Dictionary & Atomic DDL": mysql/server-architecture/10-data-dictionary.md
      - "11. What Percona Adds": mysql/server-architecture/11-percona-additions.md
      - "12. Capstone": mysql/server-architecture/12-journey-capstone.md
  - InnoDB Architecture:
      - Series Overview: mysql/innodb-architecture/README.md
      - "0. Overview & Roadmap": mysql/innodb-architecture/00-overview.md
      - "1. Files & Tablespaces": mysql/innodb-architecture/01-file-storage.md
      - "2. Page & Record Format": mysql/innodb-architecture/02-page-format.md
      - "3. The Buffer Pool": mysql/innodb-architecture/03-buffer-pool.md
      - "4. Mini-Transactions & Latching": mysql/innodb-architecture/04-mini-transactions.md
      - "5. Redo Log & Crash Recovery": mysql/innodb-architecture/05-redo-log-recovery.md
      - "6. The B+Tree": mysql/innodb-architecture/06-btree.md
      - "7. Transactions, Undo & MVCC": mysql/innodb-architecture/07-transactions-mvcc.md
      - "8. The Lock Manager": mysql/innodb-architecture/08-locking.md
      - "9. Row Operations": mysql/innodb-architecture/09-row-operations.md
      - "10. The Data Dictionary": mysql/innodb-architecture/10-data-dictionary.md
      - "11. Startup & the Embedded API": mysql/innodb-architecture/11-startup-api.md
      - "12. Background Threads & Insert Buffer": mysql/innodb-architecture/12-background-threads.md
  - InnoDB Parser (C):
      - Series Overview: mysql/innodb-parser/README.md
      - "1. Reading InnoDB Without a Server": mysql/innodb-parser/01-overview.md
      - "2. The Build Challenge": mysql/innodb-parser/02-build-challenge.md
      - "3. Decrypt → Decompress → Parse": mysql/innodb-parser/03-pipeline.md
      - "4. A C ABI & Verification": mysql/innodb-parser/04-c-api-and-verification.md
  - InnoDB in Rust:
      - Series Overview: mysql/innodb-rust/README.md
      - "1. Why Rewrite InnoDB in Rust?": mysql/innodb-rust/01-why-rust-innodb.md
      - "2. Architecture: 23 Crates": mysql/innodb-rust/02-architecture.md
      - "3. Reading & Writing the Format": mysql/innodb-rust/03-reading-writing-ibd.md
      - "4. Parity Testing": mysql/innodb-rust/04-parity-testing.md
      - "5. The State of Parity": mysql/innodb-rust/05-state-of-parity.md
  - Notes:
      - Overview: notes/index.md
      - Current summary: notes/summary.md
      - 2024 summary: notes/summary_2024.md
      - 2023 summary: notes/summary_2023.md
      - Svelte UI list: notes/svelte-ui-list.md
